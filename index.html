          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Toutes les entreprises françaises assujetties à la TVA sont concernées, y compris les auto-entrepreneurs et micro-entreprises en franchise de TVA. À partir du 1er septembre 2026, toutes devront être en capacité de recevoir des factures électroniques. L'émission devient obligatoire progressivement selon la taille de l'entreprise."

        },
